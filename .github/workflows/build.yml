name: Build Xposed Module

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Xposed API
        run: |
          mkdir -p libs
          curl -sL -o libs/xposed-api.jar "https://repo1.maven.org/maven2/de/robv/android/xposed/api/93/api-93.jar"

      - name: Compile Java
        run: |
          mkdir -p build/classes
          javac -d build/classes \
            -classpath libs/xposed-api.jar:$ANDROID_HOME/platforms/android-34/android.jar \
            app/src/main/java/com/example/fridaloader/MainHook.java

      - name: Convert to DEX
        run: |
          mkdir -p build/dex
          $ANDROID_HOME/build-tools/*/d8 --lib $ANDROID_HOME/platforms/android-34/android.jar \
            --output build/dex \
            build/classes/com/example/fridaloader/MainHook.class

      - name: Package APK
        run: |
          mkdir -p build/apk
          # Create the APK with aapt2
          $ANDROID_HOME/build-tools/*/aapt2 link \
            -I $ANDROID_HOME/platforms/android-34/android.jar \
            --manifest app/src/main/AndroidManifest.xml \
            -o build/apk/unsigned.apk

          # Add DEX
          cd build/apk
          zip -j unsigned.apk ../dex/classes.dex

          # Add assets (xposed_init must be in assets/ folder)
          cd ../../app/src/main
          zip -r ../../../build/apk/unsigned.apk assets/xposed_init
          cd ../../../build/apk

      - name: Align and Sign
        run: |
          # Align
          $ANDROID_HOME/build-tools/*/zipalign -f -p 4 build/apk/unsigned.apk build/apk/aligned.apk

          # Create keystore
          keytool -genkey -v -keystore build/apk/release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass password -keypass password -dname "CN=developer"

          # Sign
          $ANDROID_HOME/build-tools/*/apksigner sign \
            --ks build/apk/release.keystore \
            --ks-pass pass:password \
            --out build/FridaGadgetLoader.apk \
            build/apk/aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FridaGadgetLoader
          path: build/FridaGadgetLoader.apk
