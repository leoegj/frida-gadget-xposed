name: Build Xposed Module

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platforms
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true

      - name: Compile to DEX
        run: |
          BT=$ANDROID_HOME/build-tools/34.0.0
          ANDROID_JAR=$ANDROID_HOME/platforms/android-34/android.jar

          # Compile Java
          mkdir -p build/classes
          find app/src/main/java -name "*.java" > build/sources.txt
          javac -d build/classes -classpath $ANDROID_JAR -source 8 -target 8 @build/sources.txt
          echo "Java compiled OK"

          # Convert to DEX
          mkdir -p build/dex
          $BT/d8 --lib $ANDROID_JAR --min-api 29 --output build/dex \
            build/classes/de/robv/android/xposed/*.class \
            build/classes/de/robv/android/xposed/callbacks/*.class \
            build/classes/com/example/fridaloader/*.class
          echo "DEX created: $(ls -la build/dex/classes.dex)"

      - name: Create APK
        run: |
          set -x  # debug mode
          BT=$ANDROID_HOME/build-tools/34.0.0
          ANDROID_JAR=$ANDROID_HOME/platforms/android-34/android.jar
          
          echo "Checking tools..."
          ls -la $BT/ | grep -E "aapt|d8|apksigner" | head -10
          echo "ANDROID_JAR exists: $(test -f $ANDROID_JAR && echo YES || echo NO)"

          # Create binary AndroidManifest.xml using aapt2 compile+link (more reliable)
          mkdir -p build/apk_res/values
          echo '<?xml version="1.0" encoding="utf-8"?><resources/>' > build/apk_res/values/strings.xml
          
          # Method 1: aapt2
          mkdir -p build/apk
          $BT/aapt2 compile \
            -o build/compiled_res.zip \
            --dir app/src/main/res 2>/dev/null || true
          $BT/aapt2 link \
            -I $ANDROID_JAR \
            --manifest app/src/main/AndroidManifest.xml \
            --auto-add-overlay \
            -o build/apk/template.apk 2>/dev/null || true
          
          # Method 2: fallback to aapt  
          if [ ! -s build/apk/template.apk ]; then
            echo "aapt2 failed, trying aapt..."
            $BT/aapt package -f \
              -M app/src/main/AndroidManifest.xml \
              -S build/apk_res \
              -I $ANDROID_JAR \
              -F build/apk/template.apk 2>&1 || true
          fi
          
          # Method 3: absolute last resort - manually create APK with binary manifest
          if [ ! -s build/apk/template.apk ]; then
            echo "Both aapt/aapt2 failed, creating minimal APK manually..."
            # Create a minimal valid APK using aapt with no resources
            mkdir -p build/apk/nores
            $BT/aapt package -f \
              -M app/src/main/AndroidManifest.xml \
              -I $ANDROID_JAR \
              -F build/apk/template.apk 2>&1 || true
          fi
          
          echo "Template APK: $(ls -la build/apk/template.apk 2>&1)"
          
          # If we still don't have a template, create one from scratch
          if [ ! -s build/apk/template.apk ]; then
            echo "Creating manual APK structure..."
            mkdir -p build/apk/manual
            # Use aapt2 to dump: creates binary manifests via aapt2
            # Actually let's try aapt2 link with empty compiled resources
            echo '<?xml version="1.0" encoding="utf-8"?><resources/>' | \
              $BT/aapt2 compile -o build/empty_res.zip --dir - 2>/dev/null || true
            $BT/aapt2 link \
              -I $ANDROID_JAR \
              --manifest app/src/main/AndroidManifest.xml \
              -o build/apk/template.apk 2>&1 || true
          fi

          # Verify we have a template
          ls -la build/apk/template.apk 2>&1 || echo "NO TEMPLATE APK"
          
          # Merge classes.dex into APK
          mkdir -p /tmp/apk_build
          cd /tmp/apk_build
          if [ -f $GITHUB_WORKSPACE/build/apk/template.apk ] && [ -s $GITHUB_WORKSPACE/build/apk/template.apk ]; then
            unzip -o $GITHUB_WORKSPACE/build/apk/template.apk 2>/dev/null || true
          fi
          cp $GITHUB_WORKSPACE/build/dex/classes.dex .
          mkdir -p $GITHUB_WORKSPACE/build/apk
          zip -r $GITHUB_WORKSPACE/build/apk/unsigned_v2.apk . 2>&1
          cd $GITHUB_WORKSPACE
          echo "Final APK: $(ls -la build/apk/unsigned_v2.apk 2>&1)"

      - name: Sign APK
        run: |
          BT=$ANDROID_HOME/build-tools/34.0.0
          
          # Generate keystore
          keytool -genkey -v -keystore /tmp/release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass password -keypass password -dname "CN=dev" 2>/dev/null
          
          # zipalign
          $BT/zipalign -f -p 4 build/apk/unsigned_v2.apk build/apk/aligned.apk
          
          # Sign
          $BT/apksigner sign \
            --ks /tmp/release.keystore --ks-pass pass:password \
            --out build/FridaGadgetLoader.apk \
            build/apk/aligned.apk
          
          echo "=== Final APK ==="
          ls -la build/FridaGadgetLoader.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FridaGadgetLoader
          path: build/FridaGadgetLoader.apk
