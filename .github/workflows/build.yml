name: Build Xposed Module

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true
          echo "SDK ready"

      - name: Create Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o gradle/wrapper/gradle.zip
          # Generate minimal wrapper
          echo 'distributionBase=GRADLE_USER_HOME' > gradle/wrapper/gradle-wrapper.properties
          echo 'distributionPath=wrapper/dists' >> gradle/wrapper/gradle-wrapper.properties
          echo 'distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip' >> gradle/wrapper/gradle-wrapper.properties
          echo 'networkTimeout=10000' >> gradle/wrapper/gradle-wrapper.properties
          echo 'validateDistributionUrl=true' >> gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew 2>/dev/null || true

      - name: Build with Gradle
        run: |
          # Generate wrapper and build
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          # Create local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          # Use gradle directly (pre-installed on runner)
          which gradle
          gradle wrapper --gradle-version=8.5
          ./gradlew assembleRelease --no-daemon

      - name: Find APK
        run: |
          find . -name "*.apk" -type f | head -5

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FridaGadgetLoader
          path: app/build/outputs/apk/release/*.apk
