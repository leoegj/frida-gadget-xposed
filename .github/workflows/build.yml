name: Build Xposed Module

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true

      - name: Compile Java
        run: |
          mkdir -p build/classes
          find app/src/main/java -name "*.java" > build/sources.txt
          javac -d build/classes \
            -classpath $ANDROID_HOME/platforms/android-34/android.jar \
            @build/sources.txt

      - name: Convert to DEX
        run: |
          mkdir -p build/dex
          $ANDROID_HOME/build-tools/*/d8 --lib $ANDROID_HOME/platforms/android-34/android.jar \
            --output build/dex \
            build/classes/de/robv/android/xposed/*.class \
            build/classes/de/robv/android/xposed/callbacks/*.class \
            build/classes/com/example/fridaloader/*.class

      - name: Package APK
        run: |
          mkdir -p build/apk
          # Create APK with aapt2
          $ANDROID_HOME/build-tools/*/aapt2 link \
            -I $ANDROID_HOME/platforms/android-34/android.jar \
            --manifest app/src/main/AndroidManifest.xml \
            --auto-add-overlay \
            -o build/apk/unsigned.apk

          # Add DEX
          cd build/dex
          zip -j ../apk/unsigned.apk classes.dex classes2.dex 2>/dev/null || zip -j ../apk/unsigned.apk classes.dex

          # Add assets
          cd ../../app/src/main
          zip -r ../../../build/apk/unsigned.apk assets/xposed_init
          cd ../../../build/apk

      - name: Sign APK
        run: |
          # Align
          $ANDROID_HOME/build-tools/*/zipalign -f -p 4 unsigned.apk aligned.apk

          # Create keystore
          keytool -genkey -v -keystore release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass password -keypass password -dname "CN=dev"

          # Sign
          $ANDROID_HOME/build-tools/*/apksigner sign \
            --ks release.keystore --ks-pass pass:password \
            --out ../FridaGadgetLoader.apk aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FridaGadgetLoader
          path: build/FridaGadgetLoader.apk
