name: Build Xposed Module

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platforms
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1 || true

      - name: Compile to DEX
        run: |
          BT=$ANDROID_HOME/build-tools/34.0.0
          ANDROID_JAR=$ANDROID_HOME/platforms/android-34/android.jar

          # Compile Java
          mkdir -p build/classes
          find app/src/main/java -name "*.java" > build/sources.txt
          javac -d build/classes -classpath $ANDROID_JAR -source 8 -target 8 @build/sources.txt
          echo "Java compiled OK"

          # Convert to DEX
          mkdir -p build/dex
          $BT/d8 --lib $ANDROID_JAR --min-api 29 --output build/dex \
            build/classes/de/robv/android/xposed/*.class \
            build/classes/de/robv/android/xposed/callbacks/*.class \
            build/classes/com/example/fridaloader/*.class
          echo "DEX created: $(ls -la build/dex/classes.dex)"

      - name: Create APK
        run: |
          BT=$ANDROID_HOME/build-tools/34.0.0
          ANDROID_JAR=$ANDROID_HOME/platforms/android-34/android.jar
          mkdir -p build/apk

          # Method: Use aapt2 to create a proper APK with binary manifest
          # First compile any resources (even empty ones)  
          mkdir -p build/apk_res/values
          echo '<?xml version="1.0" encoding="utf-8"?> <resources/>' > build/apk_res/values/strings.xml

          $BT/aapt package -f \
            -M app/src/main/AndroidManifest.xml \
            -S build/apk_res \
            -I $ANDROID_JAR \
            -F build/apk/unsigned.apk \
            2>&1

          echo "=== aapt result ==="  
          ls -la build/apk/unsigned.apk

          # Replace/Add classes.dex
          mkdir -p build/apk/merge
          cd build/apk/merge
          unzip -o ../unsigned.apk 2>/dev/null || true
          cp ../../dex/classes.dex .
          # Re-zip
          zip -r ../unsigned_v2.apk . 2>&1
          cd ../../

          echo "=== Final unsigned APK ==="
          ls -la build/apk/unsigned_v2.apk

      - name: Sign APK
        run: |
          BT=$ANDROID_HOME/build-tools/34.0.0
          
          # Generate keystore
          keytool -genkey -v -keystore /tmp/release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass password -keypass password -dname "CN=dev" 2>/dev/null
          
          # zipalign
          $BT/zipalign -f -p 4 build/apk/unsigned_v2.apk build/apk/aligned.apk
          
          # Sign
          $BT/apksigner sign \
            --ks /tmp/release.keystore --ks-pass pass:password \
            --out build/FridaGadgetLoader.apk \
            build/apk/aligned.apk
          
          echo "=== Final APK ==="
          ls -la build/FridaGadgetLoader.apk

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: FridaGadgetLoader
          path: build/FridaGadgetLoader.apk
