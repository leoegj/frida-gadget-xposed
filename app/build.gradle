apply plugin: 'com.android.application'

android {
    namespace 'com.example.fridaloader'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.fridaloader"
        minSdk 29
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

repositories {
    google()
    mavenCentral()
    maven { url 'https://maven.lsposed.org/repository/' }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:93'
}
